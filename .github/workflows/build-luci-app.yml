name: Build LuCI App IPK for Phicomm N1 (Flippy R23.09.29 base)

on:
  push:
    branches:
      - main # 或者你的开发分支
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # 基于你的系统信息: OpenWrt R23.09.29 (AArch64 - Cortex-A53)
      # Phicomm N1 (Amlogic S905D) 通常使用 armvirt/64 target
      # 我们选择 OpenWrt 23.05.3 SDK for armvirt/64
      OPENWRT_SDK_URL: https://downloads.openwrt.org/releases/23.05.3/targets/armvirt/64/openwrt-sdk-23.05.3-armvirt_64.Linux-x86_64.tar.xz
      OPENWRT_SDK_DIR: openwrt-sdk # SDK 解压后的目录名，实际解压出来可能是 openwrt-sdk-23.05.3-armvirt_64.Linux-x86_64
      LUCI_APP_REPO: ${{ github.repository }} # 假设此 workflow 在你的 LuCI app fork 仓库中
      # !!! 重要: 请将下面的 LUCI_APP_NAME 修改为你的 LuCI 包的实际名称 (Makefile中的PKG_NAME) !!!
      LUCI_APP_NAME: your-luci-app-name-here
      # LUCI_APP_BRANCH: main # 如果你的 app 在特定分支

    steps:
      - name: Checkout LuCI App source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LUCI_APP_REPO }}
          # ref: ${{ env.LUCI_APP_BRANCH }} # 如果需要指定分支
          path: source_luci_app # 将 LuCI App 源码检出到 'source_luci_app' 目录

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache libncurses5-dev libncursesw5-dev \
                               zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget \
                               unzip python3 python3-distutils file

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O openwrt-sdk.tar.xz ${{ env.OPENWRT_SDK_URL }}
          # 提取并重命名，确保目录名是我们期望的 ${{ env.OPENWRT_SDK_DIR }}
          TEMP_SDK_EXTRACT_DIR=$(tar -tf openwrt-sdk.tar.xz | head -1 | cut -f1 -d"/")
          tar -xJf openwrt-sdk.tar.xz
          mv "${TEMP_SDK_EXTRACT_DIR}" "${{ env.OPENWRT_SDK_DIR }}"
          cd ${{ env.OPENWRT_SDK_DIR }}
          # ./scripts/feeds update -a  # 如果你的 LuCI App 依赖 OpenWrt feeds 中的包，取消注释
          # ./scripts/feeds install -a # 同上

      - name: Copy LuCI app to SDK package directory
        run: |
          mkdir -p ${{ env.OPENWRT_SDK_DIR }}/package/custom
          cp -r ./source_luci_app ${{ env.OPENWRT_SDK_DIR }}/package/custom/${{ env.LUCI_APP_NAME }}

      - name: Select LuCI app and build
        working-directory: ./${{ env.OPENWRT_SDK_DIR }}
        run: |
          # 为 SDK 生成一个最小的 .config，仅选择我们的包
          echo "CONFIG_TARGET_armvirt=y" > .config # 确保目标平台被选中
          echo "CONFIG_TARGET_armvirt_64=y" >> .config # 确保子目标被选中
          echo "CONFIG_PACKAGE_luci-base=y" >> .config # 大部分LuCI App依赖这个
          # 你可能需要添加其他LuCI核心包，如luci-lib-jsonc, luci-lib-nixio等，根据你的app依赖
          # echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          # echo "CONFIG_PACKAGE_luci-lib-ipkg=y" >> .config
          echo "CONFIG_PACKAGE_${{ env.LUCI_APP_NAME }}=y" >> .config # 选择你的包

          # 如果你的包有其他内核模块或非LuCI的依赖，也需要在这里声明
          # 例如: echo "CONFIG_PACKAGE_kmod-ipt-nat=y" >> .config
          # 例如: echo "CONFIG_PACKAGE_some-dependency=y" >> .config

          make defconfig # 基于 .config 生成完整的配置

          echo "Current .config relevant entries:"
          grep -E "CONFIG_TARGET_armvirt|CONFIG_PACKAGE_luci|CONFIG_PACKAGE_${{ env.LUCI_APP_NAME }}" .config || true

          # 编译单个包
          # 注意路径：package/custom/${{ env.LUCI_APP_NAME }}
          echo "Building package: ${{ env.LUCI_APP_NAME }}"
          make package/custom/${{ env.LUCI_APP_NAME }}/compile V=s IGNORE_ERRORS=m # V=s for verbose, IGNORE_ERRORS for robustness if building multiple things

          # 如果上面命令找不到包，尝试更通用的编译命令，它会自己找到包
          # make package/${{ env.LUCI_APP_NAME }}/compile V=s

      - name: List IPK files for debugging
        run: |
          echo "Looking for IPK files in ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/"
          find ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/ -name "*.ipk" -print
          echo "Looking for IPK file specifically for ${{ env.LUCI_APP_NAME }}"
          find ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/ -name "${{ env.LUCI_APP_NAME }}_*.ipk" -print
          find ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/ -name "luci-i18n-${{ env.LUCI_APP_NAME }}-*_*.ipk" -print


      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-${{ env.LUCI_APP_NAME }}-ipks-aarch64_cortex-a53
          # SDK 会将 aarch64_cortex-a53 架构的包放在对应的目录下
          # armvirt/64 SDK 编译出的包架构通常是 aarch64_generic 或者 aarch64_cortex-a53
          # 具体架构名可以在编译日志或 bin/packages/ 目录下看到
          # 使用更通用的路径匹配，以防架构名略有不同
          path: |
            ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/*/*/${{ env.LUCI_APP_NAME }}_*.ipk
            ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/*/*/*/${{ env.LUCI_APP_NAME }}_*.ipk
            ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/*/*/luci-i18n-${{ env.LUCI_APP_NAME }}-*_*.ipk
            ./${{ env.OPENWRT_SDK_DIR }}/bin/packages/*/*/*/luci-i18n-${{ env.LUCI_APP_NAME }}-*_*.ipk
          if-no-files-found: error # 如果没有找到文件则报错
